services:
  jekyll:
    build:
      context: .
      network: host          # build (bundle install) needs host net to reach rubygems.org
    container_name: jekyll-sp
    # Host networking: the bridge can't reach this machine's DNS (192.168.122.1),
    # so we bind directly to the host. Ports 14000 (site) + 35729 (livereload)
    # are published automatically — no `ports:` mapping needed.
    network_mode: host
    volumes:
      - .:/site                        # mount this repo into the container
      - bundle_cache:/usr/local/bundle # persist installed gems across rebuilds
      # .claude is a symlink to /home/fung/workspace/pom-fung/.claude (shared skills across repos).
      # Jekyll's reader resolves realpath on every entry (even excluded ones) to guard against
      # symlinks pointing outside the site source — if the target isn't mounted, that resolution
      # throws ENOENT before the exclude list is even consulted. Mounting the real target at the
      # same absolute host path lets the symlink resolve inside the container too.
      - /home/fung/workspace/pom-fung/.claude:/home/fung/workspace/pom-fung/.claude:ro
    command: >
      bundle exec jekyll serve
      --host 0.0.0.0
      --port 14000
      --livereload
      --livereload-port 35729
      --force_polling
      --incremental

  browser:
    profiles:
      - browser
    build:
      context: ./browser
    # host networking so it can reach jekyll-sp's localhost:14000 directly
    network_mode: host
    volumes:
      - ./.browser:/output
    tty: true
    stdin_open: true

volumes:
  bundle_cache:
